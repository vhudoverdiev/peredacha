server {
    listen 80;
    server_name akvilon-peredacha.ru www.akvilon-peredacha.ru;

    root /var/www/crm_flask/landing;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }
}

server {
    listen 80;
    server_name lk.akvilon-peredacha.ru;

    client_max_body_size 50M;

    location /static/ {
        alias /var/www/crm_flask/app/static/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn-crm_flask.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
