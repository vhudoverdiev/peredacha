<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Технические работы' }}</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=v66-maintenance-like-documents">
</head>
<body class="maintenance-body">
  <main class="maintenance-screen" aria-live="polite">
    <section class="under-dev-page maintenance-under-dev-page">
      <div class="under-dev-card maintenance-card card content-card">
        <div class="card-body">
          <div class="under-dev-icon"><i class="bi bi-cone-striped"></i></div>
          <h1>{{ message or 'Технические работы' }}</h1>
          <p>Раздел находится на тех.обслуживании, скоро я восстановлю к нему доступ</p>
          <button class="btn btn-primary" type="button" onclick="if (document.referrer) { history.back(); } else { window.location.href='{{ url_for('main.objects') }}'; }">
            <i class="bi bi-arrow-left me-2"></i>Назад
          </button>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
