{% extends "base.html" %}
{% block title %}Добавить ручную задачу{% endblock %}
{% block content %}
<div class="page-head remarks-page-head">
  <div>
    <h1 class="page-title">Добавить ручную задачу</h1>
  </div>
  <a class="btn btn-outline-secondary" href="{{ url_for('main.assignments') }}">Назад</a>
</div>

<form method="post" class="card content-card task-manual-form">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div class="card-body">
    <div class="row g-3">
      <div class="col-12 col-md-4">
        <label class="form-label">Квартира / коммерция</label>
        <select class="form-select" name="apartment_id" required>
          <option value="">Выберите квартиру / коммерцию</option>
          {% for apartment in apartments %}
            <option value="{{ apartment.id }}">{{ apartment.label() }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label">Исполнитель</label>
        <select class="form-select" name="responsible_id">
          <option value="">Пока не назначать</option>
          {% for user in users %}
            <option value="{{ user.id }}">{{ user.full_name or user.username }} — {{ ROLE_LABELS.get(user.role, user.role) }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label">Дата выполнения</label>
        <input class="form-control" type="date" name="planned_date">
      </div>
      <div class="col-12">
        <label class="form-label">Наименование задачи</label>
        <textarea class="form-control" name="description" rows="4" required placeholder="Например: проверить регулировку окна после устранения"></textarea>
      </div>
    </div>
    <div class="material-form-footer mt-4">
      <button class="btn btn-primary" type="submit"><i class="bi bi-plus-lg me-2"></i>Добавить задачу</button>
      <a class="btn btn-outline-secondary" href="{{ url_for('main.assignments') }}">Отмена</a>
    </div>
  </div>
</form>
{% endblock %}
