{% extends "base.html" %}
{% block title %}Ошибка сайта{% endblock %}
{% block content %}
<div class="card content-card site-error-500">
  <div class="card-body text-center py-5">
    <div class="site-error-500-icon"><i class="bi bi-exclamation-triangle"></i></div>
    <h1 class="page-title mb-2">Произошла ошибка</h1>
    <p class="text-muted mb-4">Мы уже сохранили сообщение об ошибке в журнале. Можно вернуться назад и попробовать ещё раз.</p>
    <a class="btn btn-primary" href="{{ url_for('main.dashboard') }}">На дашборд</a>
  </div>
</div>
{% endblock %}
